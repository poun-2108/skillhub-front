name: CI — skillhub-front

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main

jobs:

  build:
    name: Lint ESLint + Tests + Build Vite
    runs-on: ubuntu-latest

    steps:

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Installer les dependances npm
        run: npm ci

      - name: Lint ESLint
        run: npm run lint

      - name: Tests Vitest avec coverage
        run: npm run test:coverage

      - name: Analyse SonarCloud
        uses: sonarsource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Vite production
        run: npm run build

  docker:
    name: Build et Push Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:

      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Definir le tag Docker
        id: tag
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "tag=latest" >> $GITHUB_OUTPUT
          else
            echo "tag=dev" >> $GITHUB_OUTPUT
          fi

      - name: Build et Push image skillhub-front
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/skillhub-front:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKER_USERNAME }}/skillhub-front:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resume
        run: |
          echo "Image publiee :"
          echo "  ${{ secrets.DOCKER_USERNAME }}/skillhub-front:${{ steps.tag.outputs.tag }}"
          echo "  ${{ secrets.DOCKER_USERNAME }}/skillhub-front:${{ github.sha }}"
